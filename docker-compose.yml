services:
  postgres:
    image: postgres:16
    container_name: weather_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: anne
      POSTGRES_PASSWORD: anne
      POSTGRES_DB: weather_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: